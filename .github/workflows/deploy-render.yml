name: CD — Deploy no Render

on:
  workflow_run:
    workflows: ['CI — Jogo da Forca']
    branches: [main]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Render CLI
        run: npm install -g @render-com/cli

      - name: Obter Service ID
        id: service
        run: |
          ID=$(curl -s "https://api.render.com/v1/services?name=jogo-da-forca&limit=1" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | \
            jq -r '.[0].service.id // empty')
          echo "id=$ID" >> $GITHUB_OUTPUT

      - name: Criar serviço (primeira vez)
        if: steps.service.outputs.id == ''
        run: render blueprint launch --api-key ${{ secrets.RENDER_API_KEY }}

      - name: Deploy
        if: steps.service.outputs.id != ''
        run: render deploys create ${{ steps.service.outputs.id }} --api-key ${{ secrets.RENDER_API_KEY }} --wait
